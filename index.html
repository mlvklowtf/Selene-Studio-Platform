<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selene Studio | Futuro del Diseño</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #05060f; }
        .outfit-font { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="text-white selection:bg-[#eb01c0]">
    <header class="max-w-6xl mx-auto p-8 flex justify-between items-center">
        <h1 class="outfit-font font-bold text-2xl tracking-tighter">SELENE<span class="text-[#eb01c0]">.</span></h1>
        <a href="./app/index.html" class="border border-white/10 hover:border-white/40 px-6 py-2 rounded-full transition text-sm font-light">Entrar al Estudio</a>
    </header>

    <main class="text-center py-24 px-6">
        <h2 class="outfit-font text-6xl md:text-7xl font-black mb-8 tracking-tight">El futuro del diseño 3D</h2>
        <p class="outfit-font text-3xl md:text-5xl font-light mb-16 tracking-wide text-gray-300">
            TÚ fuente, <span class="italic font-normal text-white">TÚ estilo</span>
        </p>
        <a href="./app/index.html" class="inline-block bg-white text-black px-10 py-4 rounded-full font-bold hover:bg-gray-200 transition shadow-xl shadow-white/5">Comenzar a Diseñar</a>
    </main>

    <section class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8 px-6 pb-24">
        <div class="p-8 bg-white/5 rounded-3xl border border-white/5 hover:border-white/10 transition">
            <h3 class="outfit-font font-bold text-lg mb-2">Diseño Manual</h3>
            <p class="text-sm text-gray-400">Control absoluto nodo a nodo para crear fuentes únicas.</p>
        </div>
        <div class="p-8 bg-white/5 rounded-3xl border border-white/5 hover:border-white/10 transition">
            <h3 class="outfit-font font-bold text-lg mb-2">IA Creativa</h3>
            <p class="text-sm text-gray-400">Potencia tus trazos con nuestra IA avanzada (2€/mes).</p>
        </div>
        <div class="p-8 bg-white/5 rounded-3xl border border-white/5 hover:border-white/10 transition">
            <h3 class="outfit-font font-bold text-lg mb-2">Exportación</h3>
            <p class="text-sm text-gray-400">Archivos listos para tus proyectos profesionales.</p>
        </div>
    </section>
</body>
</html>
