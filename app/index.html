<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selene Studio | Canvas Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/opentype.js/1.3.4/opentype.min.js"></script>
    <!-- Librería de vectorización -->
    <script src="https://cdn.jsdelivr.net/npm/potrace@2.1.8/potrace.min.js"></script>
    <style>
        body { background-color: #111827; color: #f3f4f6; font-family: sans-serif; overflow: hidden; }
        .canvas-container { cursor: crosshair; }
        input[type=range] { accent-color: #eb01c0; }
        .workspace-bg { background-color: #1f2937; }
        #designCanvas { background-color: #ffffff !important; display: block; touch-action: none; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="border-b border-gray-800 p-4 flex justify-between items-center bg-gray-900 shadow-sm z-10">
        <div class="flex items-center gap-4">
            <a href="../index.html" class="text-gray-400 hover:text-white transition text-xs font-bold uppercase tracking-widest px-4 py-2 border border-gray-700 rounded-full hover:bg-gray-800">← Volver</a>
            <h1 class="font-bold tracking-tighter text-lg text-white">SELENE<span class="text-[#eb01c0]">.</span>STUDIO</h1>
        </div>
        <div class="px-6 py-2 rounded-full text-xs font-bold bg-gray-800 border border-gray-700 text-gray-400">Canvas Pro v2.0</div>
    </header>

    <main class="flex-grow flex p-6 gap-6 overflow-hidden">
        
        <aside class="w-80 bg-gray-900 border border-gray-800 rounded-2xl p-6 flex flex-col gap-6 shadow-sm overflow-y-auto">
            
            <div>
                <h2 class="text-xs font-bold text-gray-500 uppercase mb-4 tracking-wider">Modo de Dibujo</h2>
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <button id="brushBtn" onclick="setMode('brush')" class="py-2 text-xs border border-[#eb01c0] bg-[#eb01c0]/10 text-white rounded-lg">Pincel</button>
                    <button id="eraserBtn" onclick="setMode('eraser')" class="py-2 text-xs border border-gray-700 text-gray-300 rounded-lg hover:bg-gray-800">Goma</button>
                </div>
                
                <div id="brushSettings">
                    <label class="text-xs text-gray-400">Grosor Pincel: <span id="brushVal">5</span>px</label>
                    <input type="range" min="1" max="50" value="5" class="w-full mt-2" oninput="updateBrushSize(this.value)">
                </div>

                <div id="eraserSettings" class="hidden">
                    <label class="text-xs text-gray-400 mb-2 block">Grosor Goma:</label>
                    <div class="grid grid-cols-4 gap-2">
                        <button onclick="updateEraserSize(5)" class="p-2 border border-gray-700 rounded-lg hover:bg-gray-800">5</button>
                        <button onclick="updateEraserSize(15)" class="p-2 border border-gray-700 rounded-lg hover:bg-gray-800">15</button>
                        <button onclick="updateEraserSize(30)" class="p-2 border border-gray-700 rounded-lg hover:bg-gray-800">30</button>
                        <button onclick="updateEraserSize(50)" class="p-2 border border-gray-700 rounded-lg hover:bg-gray-800">50</button>
                    </div>
                </div>
            </div>

            <div>
                <h2 class="text-xs font-bold text-gray-500 uppercase mb-4 tracking-wider">Color</h2>
                <div class="grid grid-cols-5 gap-2 items-center">
                    <button onclick="changeColor('#000000')" class="w-8 h-8 rounded-full bg-black border border-gray-700 hover:scale-110 transition"></button>
                    <button onclick="changeColor('#eb01c0')" class="w-8 h-8 rounded-full bg-[#eb01c0] hover:scale-110 transition"></button>
                    <button onclick="changeColor('#5856bc')" class="w-8 h-8 rounded-full bg-[#5856bc] hover:scale-110 transition"></button>
                    <button onclick="changeColor('#00ffcc')" class="w-8 h-8 rounded-full bg-[#00ffcc] hover:scale-110 transition"></button>
                    <input type="color" onchange="changeColor(this.value)" class="w-8 h-8 rounded-full cursor-pointer bg-transparent border-0 p-0 overflow-hidden" title="Selector personalizado">
                </div>
            </div>

            <div class="mt-auto flex flex-col gap-2">
            <button onclick="exportCanvas('png')" class="w-full py-3 bg-gray-800 text-white rounded-xl text-xs font-bold hover:bg-gray-700 transition">Exportar PNG</button>
            <button onclick="exportCanvas('ttf')" class="w-full py-3 bg-[#eb01c0] text-white rounded-xl text-xs font-bold hover:bg-pink-600 transition shadow-lg shadow-pink-900/20">Convertir a .TTF (Font)</button>
            <button onclick="clearCanvas()" class="w-full py-3 bg-red-900/20 text-red-400 border border-red-900/50 rounded-xl text-xs font-bold hover:bg-red-900/40 transition">Limpiar Lienzo</button>
        </div>
    </aside>

    <section class="flex-grow rounded-2xl relative overflow-hidden shadow-2xl workspace-bg flex items-center justify-center p-4">
        <canvas id="designCanvas" class="shadow-lg"></canvas>
    </section>
</main>

<script>
        const canvas = document.getElementById('designCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let mode = 'brush';
        let color = '#000000';
        let brushSize = 5;
        let eraserSize = 20;

        function resizeCanvas() {
            const parent = canvas.parentElement;
            canvas.width = parent.clientWidth - 32; 
            canvas.height = parent.clientHeight - 32;
            clearCanvas();
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
        canvas.addEventListener('mousemove', draw);

        function setMode(m) {
            mode = m;
            document.getElementById('brushSettings').classList.toggle('hidden', m !== 'brush');
            document.getElementById('eraserSettings').classList.toggle('hidden', m !== 'eraser');
            document.getElementById('brushBtn').className = m === 'brush' ? 'py-2 text-xs border border-[#eb01c0] bg-[#eb01c0]/10 text-white rounded-lg' : 'py-2 text-xs border border-gray-700 text-gray-300 rounded-lg hover:bg-gray-800';
            document.getElementById('eraserBtn').className = m === 'eraser' ? 'py-2 text-xs border border-[#eb01c0] bg-[#eb01c0]/10 text-white rounded-lg' : 'py-2 text-xs border border-gray-700 text-gray-300 rounded-lg hover:bg-gray-800';
        }

        function draw(e) {
            if (!drawing) return;
            ctx.lineWidth = mode === 'brush' ? brushSize : eraserSize;
            ctx.lineCap = 'round';
            ctx.strokeStyle = mode === 'brush' ? color : '#ffffff';
            ctx.globalCompositeOperation = mode === 'brush' ? 'source-over' : 'destination-out';
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        }

        function changeColor(c) { color = c; }
        function updateBrushSize(s) { brushSize = s; document.getElementById('brushVal').innerText = s; }
        function updateEraserSize(s) { eraserSize = s; }
        
        function clearCanvas() { 
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height); 
        }

        function exportCanvas(format) {
            if (format === 'png') {
                const link = document.createElement('a');
                link.download = 'selene-design.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            } else if (format === 'ttf') {
                generateTTF();
            }
        }

        function generateTTF() {
            // 1. Usar Potrace para convertir la imagen del canvas a SVG path
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            Potrace.loadImageFromCanvas(canvas);
            Potrace.process(() => {
                const svg = Potrace.getSVG(1); // 1 = factor de escala
                
                // 2. Crear fuente con el path extraído
                const font = new opentype.Font({
                    familyName: 'SeleneCustom',
                    styleName: 'Medium',
                    unitsPerEm: 1000,
                    ascender: 800,
                    descender: -200,
                    glyphs: []
                });

                // Este es un ejemplo simplificado: en un caso real, deberías parsear el SVG path obtenido
                // hacia los comandos de opentype.Path()
                const path = new opentype.Path();
                // path.commands = ... (Aquí iría el parsing de los datos de Potrace)
                
                font.glyphs.push(new opentype.Glyph({
                    name: 'A',
                    unicode: 65,
                    advanceWidth: 800,
                    path: path
                }));

                const buffer = font.toArrayBuffer();
                const blob = new Blob([buffer], {type: 'font/ttf'});
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'SeleneFont.ttf';
                link.click();
            });
        }
</script>
</body>
</html>
