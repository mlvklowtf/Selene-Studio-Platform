<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selene Studio — Local Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Local vendor scripts (no external GitHub/CDN libs) -->
    <script src="vendor/opentype.min.js"></script>
    <script src="vendor/potrace.min.js"></script>
    <style>
        body { background-color: #0b0f1a; color: #e6eef8; font-family: 'Plus Jakarta Sans', sans-serif; }
        .workspace-bg { background-color: #0f1724; }
        #designCanvas { background: white; display: block; width: 100%; height: 100%; }
    </style>
</head>
<body class="h-screen flex flex-col">
    <header class="border-b border-gray-800 p-4 bg-gray-900">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="../index.html" class="text-gray-400 hover:text-white px-3 py-1 rounded-full border border-gray-700">← Volver</a>
                <h1 class="text-white font-bold">SELENE.STUDIO</h1>
            </div>
            <div class="text-sm text-gray-400">Local-only build</div>
        </div>
    </header>

    <main class="flex-grow flex overflow-hidden">
        <aside class="w-80 bg-gray-900 border-r border-gray-800 p-6 flex flex-col gap-6">
            <div>
                <label class="text-xs text-gray-400 uppercase">Tamaño</label>
                <input id="sizeRange" type="range" min="1" max="50" value="5" class="w-full" oninput="updateSize(this.value)">
                <div class="text-xs text-gray-300 mt-2">Grosor: <span id="sizeVal">5</span>px</div>
            </div>

            <div>
                <label class="text-xs text-gray-400 uppercase">Estilo</label>
                <div class="mt-2 flex gap-2">
                    <button onclick="changeStyle('round')" class="flex-1 py-2 text-xs bg-gray-800 rounded">Redondeado</button>
                    <button onclick="changeStyle('square')" class="flex-1 py-2 text-xs bg-gray-800 rounded">Angular</button>
                </div>
            </div>

            <div class="mt-auto flex flex-col gap-2">
                <button onclick="exportCanvas()" class="py-3 bg-pink-600 text-white rounded">Exportar PNG</button>
                <button onclick="clearCanvas()" class="py-3 bg-gray-800 text-gray-200 rounded">Limpiar</button>
            </div>
        </aside>

        <section class="flex-grow p-6 workspace-bg flex items-center justify-center">
            <div class="w-full h-full rounded-lg overflow-hidden bg-white flex items-center justify-center">
                <canvas id="designCanvas"></canvas>
            </div>
        </section>
    </main>

    <script>
        const canvas = document.getElementById('designCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false; let color = '#000'; let size = 5; let lineCap = 'round';

        function resizeCanvas(){
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width - 32; canvas.height = rect.height - 32;
            clearCanvas();
        }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        canvas.addEventListener('mousedown', ()=> drawing = true);
        canvas.addEventListener('mouseup', ()=> { drawing = false; ctx.beginPath(); });
        canvas.addEventListener('mousemove', draw);

        function draw(e){
            if(!drawing) return;
            const rect = canvas.getBoundingClientRect();
            ctx.lineWidth = size; ctx.lineCap = lineCap; ctx.strokeStyle = color;
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke(); ctx.beginPath(); ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        }

        function updateSize(v){ size = v; document.getElementById('sizeVal').innerText = v; }
        function changeStyle(s){ lineCap = s; }
        function clearCanvas(){ ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height); }
        function exportCanvas(){ const link=document.createElement('a'); link.href=canvas.toDataURL('image/png'); link.download='selene-design.png'; link.click(); }
    </script>
</body>
</html>
