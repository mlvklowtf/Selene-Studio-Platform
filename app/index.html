<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selene Studio | Canvas Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #111827; color: #f3f4f6; font-family: sans-serif; overflow: hidden; }
        .canvas-container { cursor: crosshair; }
        input[type=range] { accent-color: #eb01c0; }
        .workspace-bg { background-color: #1f2937; }
        /* Forzar visualización de elementos */
        #designCanvas { background-color: #ffffff !important; display: block; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="border-b border-gray-800 p-4 flex justify-between items-center bg-gray-900 shadow-sm z-10">
        <div class="flex items-center gap-4">
            <a href="../index.html" class="text-gray-400 hover:text-white transition text-xs font-bold uppercase tracking-widest px-4 py-2 border border-gray-700 rounded-full hover:bg-gray-800">← Volver</a>
            <h1 class="font-bold tracking-tighter text-lg text-white">SELENE<span class="text-[#eb01c0]">.</span>STUDIO</h1>
        </div>
        <div class="px-6 py-2 rounded-full text-xs font-bold bg-gray-800 border border-gray-700 text-gray-400">Canvas Activo</div>
    </header>

    <main class="flex-grow flex p-6 gap-6 overflow-hidden">
        
        <aside class="w-80 bg-gray-900 border border-gray-800 rounded-2xl p-6 flex flex-col gap-8 shadow-sm">
            
            <div>
                <h2 class="text-xs font-bold text-gray-500 uppercase mb-4 tracking-wider">Paleta de Colores</h2>
                <div class="grid grid-cols-5 gap-2 items-center">
                    <button onclick="changeColor('#000000')" class="w-8 h-8 rounded-full bg-black border border-gray-700 hover:scale-110 transition"></button>
                    <button onclick="changeColor('#eb01c0')" class="w-8 h-8 rounded-full bg-[#eb01c0] hover:scale-110 transition"></button>
                    <button onclick="changeColor('#5856bc')" class="w-8 h-8 rounded-full bg-[#5856bc] hover:scale-110 transition"></button>
                    <button onclick="changeColor('#00ffcc')" class="w-8 h-8 rounded-full bg-[#00ffcc] hover:scale-110 transition"></button>
                    <input type="color" onchange="changeColor(this.value)" class="w-8 h-8 rounded-full cursor-pointer bg-transparent border-0 p-0 overflow-hidden" title="Selector personalizado">
                </div>
            </div>

            <div>
                <h2 class="text-xs font-bold text-gray-500 uppercase mb-4 tracking-wider">Ajustes de Trazo</h2>
                <label class="text-xs text-gray-400">Grosor: <span id="sizeVal">5</span>px</label>
                <input type="range" id="sizeRange" min="1" max="50" value="5" class="w-full mt-2 mb-4" oninput="updateSize(this.value)">
                
                <div class="flex gap-2 mb-4">
                    <button onclick="changeStyle('round')" class="flex-1 py-2 text-xs border border-gray-700 text-gray-300 rounded-lg hover:bg-gray-800">Redondeado</button>
                    <button onclick="changeStyle('square')" class="flex-1 py-2 text-xs border border-gray-700 text-gray-300 rounded-lg hover:bg-gray-800">Angular</button>
                </div>
            </div>

            <div class="mt-auto flex flex-col gap-2">
                <button onclick="exportCanvas()" class="w-full py-3 bg-[#eb01c0] text-white rounded-xl text-xs font-bold hover:bg-pink-600 transition shadow-lg shadow-pink-900/20">Exportar (PNG a TTF)</button>
                <button onclick="clearCanvas()" class="w-full py-3 bg-gray-800 text-gray-300 border border-gray-700 rounded-xl text-xs font-bold hover:bg-gray-700 transition">Limpiar Lienzo</button>
            </div>
        </aside>

        <section class="flex-grow rounded-2xl relative overflow-hidden shadow-2xl workspace-bg flex items-center justify-center p-4">
            <canvas id="designCanvas" class="shadow-lg cursor-crosshair"></canvas>
        </section>
    </main>

    <script>
        const canvas = document.getElementById('designCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let color = '#000000';
        let size = 5;
        let lineCap = 'round';

        function resizeCanvas() {
            const parent = canvas.parentElement;
            canvas.width = parent.clientWidth - 32; 
            canvas.height = parent.clientHeight - 32;
            clearCanvas();
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
        canvas.addEventListener('mousemove', draw);

        function draw(e) {
            if (!drawing) return;
            ctx.lineWidth = size;
            ctx.lineCap = lineCap;
            ctx.strokeStyle = color;
            
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        }

        function changeColor(c) { color = c; }
        function updateSize(s) { size = s; document.getElementById('sizeVal').innerText = s; }
        function changeStyle(s) { lineCap = s; }
        
        function clearCanvas() { 
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height); 
        }

        function exportCanvas() {
            const dataUrl = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = 'selene-font-design.png';
            link.href = dataUrl;
            link.click();
        }
    </script>
</body>
</html>
