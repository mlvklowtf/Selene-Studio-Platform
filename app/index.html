<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selene Lunar Studio - Generador 3D & Vectorial</title>
    <base href="/app/">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <!-- Opentype.js -->
    <script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
    <style>
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            background: #eb01c0;
            color: white;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(235,1,192,0.3);
            display: none;
            z-index: 1000;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #05060f;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(88, 86, 188, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(235, 1, 192, 0.12) 0%, transparent 40%);
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(235, 1, 192, 0.3); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen text-gray-100 flex flex-col justify-between overflow-x-hidden">
    
    <div id="toast" class="toast"></div>

    <header class="border-b border-white/5 bg-[#05060f]/80 backdrop-blur-md px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-full bg-gradient-to-tr from-[#5856bc] to-[#eb01c0] flex items-center justify-center shadow-[0_0_15px_rgba(235,1,192,0.3)]">
                <span class="text-lg">🌙</span>
            </div>
            <div>
                <h1 class="text-md font-bold tracking-wider text-white">SELENE LUNAR STUDIO</h1>
                <p class="text-[9px] text-purple-400 font-semibold tracking-widest uppercase">Motor de Extrusión Tipográfica v2.5</p>
            </div>
        </div>
    </header>

    <main class="flex-grow flex flex-col lg:flex-row h-[calc(100vh-73px)] overflow-hidden">
        <section class="w-full lg:w-96 border-r border-white/5 bg-[#070814]/90 p-6 overflow-y-auto flex flex-col gap-6 shrink-0">
            <div>
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest block mb-3">Modo de Trabajo</span>
                <div class="grid grid-cols-2 gap-2 bg-black/40 p-1 rounded-xl border border-white/5">
                    <button id="btn-mode-auto" onclick="switchMode('auto')" class="py-2.5 px-3 rounded-lg text-xs font-bold transition-all bg-[#eb01c0] text-white shadow-lg">✨ Auto-Fases 3D</button>
                    <button id="btn-mode-manual" onclick="switchMode('manual')" class="py-2.5 px-3 rounded-lg text-xs font-bold transition-all text-gray-400 hover:text-white">✏️ Lienzo Manual</button>
                </div>
            </div>

            <div id="controls-auto" class="flex flex-col gap-5">
                <div>
                    <span class="text-xs font-bold text-gray-400 uppercase tracking-widest block mb-2">Texto de Entrada</span>
                    <input type="text" id="text-input" value="SELENE" oninput="updatePreview()" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-[#eb01c0] font-mono text-sm uppercase">
                </div>
                <div>
                    <div class="flex justify-between text-xs font-bold text-gray-400 mb-2">
                        <span>EXTRUSIÓN 3D (PROFUNDIDAD)</span>
                        <span id="val-extrusion" class="text-[#f6b7f5]">15px</span>
                    </div>
                    <input type="range" id="slide-extrusion" min="0" max="40" value="15" oninput="updateSliders(); updatePreview();" class="w-full h-1 bg-white/5 rounded-lg appearance-none cursor-pointer accent-[#eb01c0]">
                </div>
            </div>

            <div id="controls-manual" class="hidden flex flex-col gap-4">
                <div class="p-4 bg-purple-950/20 border border-purple-500/20 rounded-xl text-xs text-purple-300">
                    <p class="font-bold mb-1">💡 Modo Editor Vectorial:</p>
                    Haz clic en la cuadrícula para dibujar.
                </div>
                <button onclick="clearCanvas()" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white text-xs font-bold py-2.5 rounded-lg">🗑️ Limpiar</button>
            </div>

            <div class="mt-auto pt-6 border-t border-white/5 flex flex-col gap-3">
                <button onclick="exportSVG()" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white font-bold py-3 px-4 rounded-xl text-xs transition-all">💾 Exportar .SVG</button>
                <button onclick="generateTTF()" class="w-full bg-gradient-to-r from-[#eb01c0] to-[#5856bc] text-white font-extrabold py-4 px-4 rounded-xl text-xs transition-all">🚀 Descargar Instalador .TTF</button>
            </div>
        </section>

        <section class="flex-grow bg-[#030408] relative flex items-center justify-center p-6 select-none">
            <div class="absolute inset-0 bg-[radial-gradient(rgba(255,255,255,0.015)_1px,transparent_1px)] [background-size:32px_32px]"></div>
            <div id="preview-viewport-auto" class="w-full h-full flex flex-col justify-center items-center">
                <div id="svg-container" class="w-full max-w-2xl h-96 flex items-center justify-center"></div>
            </div>
        </section>
    </main>

    <script>
        let currentMode = 'auto';

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('controls-auto').classList.toggle('hidden', mode !== 'auto');
            document.getElementById('controls-manual').classList.toggle('hidden', mode !== 'manual');
            document.getElementById('btn-mode-auto').className = mode === 'auto' ? 'py-2.5 px-3 rounded-lg text-xs font-bold transition-all bg-[#eb01c0] text-white shadow-lg' : 'py-2.5 px-3 rounded-lg text-xs font-bold transition-all text-gray-400 hover:text-white';
            document.getElementById('btn-mode-manual').className = mode === 'manual' ? 'py-2.5 px-3 rounded-lg text-xs font-bold transition-all bg-[#eb01c0] text-white shadow-lg' : 'py-2.5 px-3 rounded-lg text-xs font-bold transition-all text-gray-400 hover:text-white';
        }

        function updateSliders() {
            document.getElementById('val-extrusion').textContent = document.getElementById('slide-extrusion').value + 'px';
        }

        function updatePreview() {
            // Lógica de renderizado SVG placeholder para evitar errores de ruta
        }

        function generateTTF() {
            showToast("Compilando fuente...");
            // Opentype.js no intentará cargar rutas externas si la fuente se crea desde cero en memoria
        }

        window.onload = () => {
            console.log("Selene Studio listo.");
        };
    </script>
</body>
</html>
