<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selene Studio | Editor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen bg-[#05060f] text-white flex flex-col">

    <!-- HEADER -->
    <header class="border-b border-white/10 p-4 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <a href="../index.html" class="text-gray-400 hover:text-white transition text-xs font-bold uppercase tracking-widest">← Volver a Inicio</a>
            <h1 class="font-bold">SELENE STUDIO</h1>
        </div>
    </header>

    <!-- ESTUDIO -->
    <main class="flex-grow flex p-6 gap-6">
        <!-- BARRA LATERAL -->
        <aside class="w-80 bg-black/50 border border-white/10 rounded-2xl p-6">
            <h2 class="text-sm font-bold mb-4">Herramientas</h2>
            <div class="space-y-4">
                <button class="w-full p-3 bg-white/5 rounded-lg text-sm border border-white/5">✏️ Lápiz Manual</button>
                <div class="p-4 bg-purple-900/20 rounded-xl border border-purple-500/30">
                    <p class="text-xs font-bold text-purple-300 mb-2">✨ Plan Selene AI (2€/mes)</p>
                    <a href="AQUÍ_TU_ENLACE_STRIPE" class="block text-center w-full bg-purple-600 text-white py-2 rounded-lg text-xs font-bold hover:bg-purple-500 transition">Suscribirse</a>
                </div>
            </div>
        </aside>

        <!-- LIENZO -->
        <section class="flex-grow border border-white/10 rounded-2xl p-6 bg-[#030408]">
            <canvas id="designCanvas" class="w-full h-full cursor-crosshair"></canvas>
        </section>
    </main>

    <script>
        // Lógica básica para que el estudio cargue y no dé error
        const canvas = document.getElementById('designCanvas');
        const ctx = canvas.getContext('2d');
        
        // Ajustar tamaño del canvas al contenedor
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.onresize = resizeCanvas;
        resizeCanvas();
    </script>
</body>
</html>
